services:
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=finanzen_secret_key_2026
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:pass123@evolution_db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution_redis:6379
      - CACHE_LOCAL_ENABLED=true
    depends_on:
      - evolution_db
      - evolution_redis
    networks:
      - evolution_network

  evolution_db:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass123
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - evolution_network

  evolution_redis:
    image: redis:7.2-alpine
    container_name: evolution_redis
    restart: always
    networks:
      - evolution_network

networks:
  evolution_network:
    driver: bridge

volumes:
  evolution_db_data:
